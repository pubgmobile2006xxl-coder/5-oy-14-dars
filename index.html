<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14-dars</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <img src="img/Group 152.png" alt="rasm">
                <img src="img/Frame 202.png" alt="rasm">
            </div>
            <div id="hearder_bottom"></div>

            <div class="header_rasm"></div>
        </div>
    </header>

    <main>
        <section id="section">
            <div class="container">
                <form action="#">
                    <p>Проверить адрес доставки</p>
                    <input id="inp" type="text" placeholder=" ADRES">
                    <button>Проверить</button>
                </form>

                <div id="section_bottom">
                    <h1>PIZZA</h1>
                    <div id="pizza_list" class="pizza_grid"></div>
                </div>
            </div>
        </section>

        <section id="section1">
            <div class="container">
                <div id="sushi">
                    <h1>SUSHI</h1>
                    <div id="sushi_list" class="sushi_grid"></div>
                </div>
            </div>
        </section>

        <section id="section2">
            <div class="container">
                <div id="zakuski">
                    <h1>ZAKUSKI</h1>
                    <div id="zakuski_list" class="zakuski_grid"></div>
                </div>
            </div>
        </section>
    </main>



    <script src="./main.js"></script>
</body>
</html>
